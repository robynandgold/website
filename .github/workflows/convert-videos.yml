name: Convert product videos to mp4

# When new product videos are uploaded (iPhones record .mov, which browsers
# won't reliably play), transcode them to compressed web-friendly mp4 and
# repoint products.json. Oversized photos are shrunk for the web too. Also
# regenerates the static product pages and sitemap. Runs after the admin
# tool publishes, and can be run by hand from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
      - 'src/images/products/**'
      - 'src/data/products.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: convert-videos
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Installed unconditionally: a retry may reset to a newer main that still
      # contains an unconverted .mov, so ffmpeg must always be available.
      - name: Install ffmpeg and ImageMagick
        run: sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick

      # Everything below is deterministic and regenerable, so on a rejected
      # push we simply reset to the latest main and redo it — rather than
      # rebasing, which cannot auto-merge the binary .mp4 files and used to
      # fail the whole job on an add/add conflict.
      - name: Convert videos, build pages and sitemap, then push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            # 1. Transcode staged videos to web-friendly .mp4. The admin tool
            #    uploads raw videos to incoming/ (outside src/, so oversized
            #    phone files never enter the deployed assets or trip
            #    Cloudflare's 25MiB per-asset limit), and products.json
            #    already points at the converted path.
            shopt -s nullglob nocaseglob
            for f in incoming/*.mov incoming/*.mp4 incoming/*.m4v incoming/*.webm; do
              name="$(basename "$f")"
              out="src/images/products/${name%.*}.mp4"
              echo "Converting $f -> $out"
              ffmpeg -y -i "$f" \
                -vf "scale='min(720,iw)':-2" \
                -c:v libx264 -preset veryfast -crf 26 -movflags +faststart -an \
                "$out"
              rm -f "$f"
            done

            # 1b. Legacy: any raw .mov committed straight into the site
            #     directory (uploads from before staging existed).
            for f in src/images/products/*.mov; do
              base="${f%.*}"
              echo "Converting $f -> ${base}.mp4"
              ffmpeg -y -i "$f" \
                -vf "scale='min(720,iw)':-2" \
                -c:v libx264 -preset veryfast -crf 26 -movflags +faststart -an \
                "${base}.mp4"
              rm -f "$f"
            done

            # 2. Repoint products.json at the .mp4 files.
            sed -i -E 's/\.mov"/.mp4"/g; s/\.MOV"/.mp4"/g' src/data/products.json

            # 3. Shrink oversized photos (straight-off-the-phone uploads are
            #    ~2-4MB; the site displays them at ~600-1600px). Only files over
            #    600KB are touched, and optimized output lands well under that,
            #    so re-runs never double-compress.
            find src/images/products -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' \) -size +600k -print0 |
              while IFS= read -r -d '' f; do
                echo "Optimizing $f"
                convert "$f" -auto-orient -strip -resize '1600x1600>' \
                  -interlace JPEG -quality 82 "$f.tmp" && mv "$f.tmp" "$f"
              done

            # 4. Site chrome: the logo displays at ~120x40 but originally
            #    shipped as a 1.5MB PNG downloaded on every page view. Cap it
            #    at 360px (3x for retina). Guarded by size so this runs once
            #    and then no-ops instead of recompressing forever.
            if [ -f src/images/rg-logo.png ] && [ "$(stat -c%s src/images/rg-logo.png)" -gt 150000 ]; then
              echo "Optimizing rg-logo.png"
              convert src/images/rg-logo.png -strip -resize '360x360>' \
                -define png:compression-level=9 src/images/rg-logo.png.tmp \
                && mv src/images/rg-logo.png.tmp src/images/rg-logo.png
            fi

            # 5. Regenerate the static product pages and sitemap.xml so a newly
            #    added piece always gets its own crawlable page and sitemap entry.
            node scripts/build.js

            git add -A
            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi
            # No [skip ci] here: Cloudflare deploys the site straight from main
            # and honours skip tags, so tagging this commit would leave the live
            # site missing the converted videos and generated product pages.
            # There is no Actions loop risk either way — pushes made with the
            # workflow's GITHUB_TOKEN never trigger other workflow runs.
            git commit -m "Auto-build: product pages, sitemap & converted videos"

            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi

            # Another publish landed on main first. Discard our commit, adopt the
            # latest main, and redo the deterministic work on top of it next loop.
            echo "Push rejected (attempt $attempt) — resetting to latest main and redoing."
            git fetch origin main
            git reset --hard origin/main
          done

          echo "Failed to push after multiple attempts."
          exit 1
