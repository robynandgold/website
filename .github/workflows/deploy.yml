name: Deploy to Cloudflare (failsafe)

# Break-glass deploy, run by hand from the Actions tab. Cloudflare's built-in
# Workers Builds is the normal pipeline; this bypasses its queue by deploying
# straight from GitHub — for days when Workers Builds is delayed or stuck
# (check cloudflarestatus.com).
#
# After using it, cancel any stale queued builds in the Cloudflare dashboard
# so they can't later complete and overwrite this deploy with an older commit.
#
# Needs two repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — "Edit Cloudflare Workers" template token
#   CLOUDFLARE_ACCOUNT_ID  — shown on the dashboard's domain Overview page

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The Worker bundles the Stripe SDK, so dependencies must be installed
      # before wrangler builds it.
      - name: Install dependencies
        run: npm install

      - name: Deploy Worker + static assets
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
