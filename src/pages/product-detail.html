<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vintage Ring | Robyn &amp; Gold</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="A personally sourced vintage ring from Robyn &amp; Gold, Ireland. Professionally cleaned and prepared, ready for its next chapter." />
  <link rel="canonical" id="meta-canonical" href="https://robynandgold.com/pages/product-detail.html" />

  <!-- Open Graph (updated dynamically by JS) -->
  <meta property="og:type" content="product" />
  <meta property="og:site_name" content="Robyn &amp; Gold" />
  <meta property="og:title" id="og-title" content="Vintage Ring | Robyn &amp; Gold" />
  <meta property="og:description" id="og-description" content="A personally sourced vintage ring from Robyn &amp; Gold, Ireland." />
  <meta property="og:image" id="og-image" content="https://robynandgold.com/images/homepage.png" />
  <meta property="og:url" id="og-url" content="https://robynandgold.com/pages/product-detail.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="tw-title" content="Vintage Ring | Robyn &amp; Gold" />
  <meta name="twitter:description" id="tw-description" content="A personally sourced vintage ring from Robyn &amp; Gold, Ireland." />
  <meta name="twitter:image" id="tw-image" content="https://robynandgold.com/images/homepage.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
  <link rel="manifest" href="/images/site.webmanifest" />
  <!-- Plausible Analytics (privacy-friendly, cookieless) -->
  <script defer data-domain="robynandgold.com" src="https://plausible.io/js/script.js"></script>
  <script>window.plausible=window.plausible||function(){(window.plausible.q=window.plausible.q||[]).push(arguments)};</script>

  </head>
  <body class="page product-page">
    <header class="site-header">
      <div class="container header-inner">
        <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-controls="primary-nav" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="nav nav-left" id="primary-nav" aria-label="Primary">
          <a href="shop.html" class="nav-link">Shop</a>
          <a href="about.html" class="nav-link">Our story</a>
          <a href="../index.html#ethos" class="nav-link">Ethos</a>
        </nav>
        <div class="brand-banner">
          <div class="brand-center">
            <a href="../index.html">
              <img src="../images/rg-logo.png" alt="Robyn & Gold" width="120" height="40" loading="eager" />
            </a>
            <a href="../index.html" class="brand-main">Robyn &amp; Gold</a>
            <span class="brand-tagline">Vintage Jewellery</span>
          </div>
        </div>

        <nav class="nav nav-right" aria-label="Utilities">
          <a href="cart.html" class="nav-link nav-link--cart" aria-label="Cart">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="icon-cart"><path d="M5 8h14l-1.1 11a1.3 1.3 0 0 1-1.3 1.2H7.4A1.3 1.3 0 0 1 6.1 19Z"/><path d="M9 8V6.6a3 3 0 0 1 6 0V8"/><path d="M9.7 12v5M14.3 12v5"/></svg>
            <span id="cart-count" class="cart-count">0</span>
          </a>
        </nav>
      </div>
    </header>

  <main>
    <section class="section">
      <div class="container">
        <!-- JS populates this element -->
        <div id="product-detail" class="product-detail-layout"></div>

        <!-- You might also like -->
        <div class="related-section" id="related-section" hidden>
          <h2 class="related-title">You might also like</h2>
          <div class="product-grid" id="related-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Sticky mobile add-to-cart bar -->
  <div class="product-sticky-bar" id="product-sticky-bar" hidden>
    <div class="psb-info">
      <small id="psb-name"></small>
      <strong id="psb-price"></strong>
    </div>
    <button class="btn btn-primary" id="psb-add-btn">Add to cart</button>
    <span class="psb-sold" id="psb-sold" hidden>Sold</span>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand-main">Robyn &amp; Gold</span>
        <span class="brand-tagline">Vintage Jewellery</span>
      </div>
<div class="footer-links">
        <a href="/pages/shop.html" class="footer-link">Shop</a>
        <a href="/pages/about.html" class="footer-link">Our story</a>
        <a href="/#ethos" class="footer-link">Ethos</a>
        <a href="/pages/contact.html" class="footer-link">Contact</a>
        <a href="/pages/terms.html" class="footer-link">T&amp;Cs</a>
        <a href="/pages/returns.html" class="footer-link">Returns</a>
      </div>
      <p class="footer-meta">© <span id="year"></span> Robyn &amp; Gold. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/products.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    let currentProduct = null;
    let allProducts = [];
    let currentSlideIndex = 0;

    function getSlugFromURL() {
      return new URLSearchParams(window.location.search).get('slug');
    }

    function formatPrice(price, currency = 'EUR') {
      const symbol = currency === 'EUR' ? '€' : currency === 'GBP' ? '£' : '$';
      return `${symbol}${price.toFixed(2)}`;
    }

    async function loadProduct() {
      const slug = getSlugFromURL();
      if (!slug) { window.location.href = 'shop.html'; return; }

      try {
        const response = await fetch('../data/products.json');
        if (response.ok) {
          const products = await response.json();
          allProducts = products;
          currentProduct = products.find(p => p.slug === slug);
          if (currentProduct) { renderProductDetails(); return; }
        }
      } catch (e) {}

      // Fallback to ProductsAPI
      let attempts = 0;
      while (!window.ProductsAPI && attempts < 50) {
        await new Promise(resolve => setTimeout(resolve, 100));
        attempts++;
      }
      if (!window.ProductsAPI) return;

      if (window.ProductsAPI.getAllProducts) {
        try { allProducts = await window.ProductsAPI.getAllProducts(); } catch (e) {}
      }
      currentProduct = await window.ProductsAPI.getProductBySlug(slug);

      if (!currentProduct) {
        document.getElementById('product-detail').innerHTML = `
          <div style="padding: 1.2rem; background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius-md); text-align: center;">
            <strong style="font-size: 1.05rem;">Product not found</strong>
            <p style="margin: 0.6rem 0 1rem; color: var(--muted);">The link may be outdated or the piece has been removed.</p>
            <a href="shop.html" class="btn btn-ghost">Back to collection</a>
          </div>`;
        return;
      }

      renderProductDetails();
    }

    function renderProductDetails() {
      if (!currentProduct) return;

      const title = `${currentProduct.name} | Robyn & Gold`;
      const description = currentProduct.description || 'A personally sourced vintage ring from Robyn & Gold, Ireland.';
      const image = currentProduct.images?.[0]
        ? `https://robynandgold.com${currentProduct.images[0]}`
        : 'https://robynandgold.com/images/homepage.png';
      const url = `https://robynandgold.com/pages/product-detail.html?slug=${currentProduct.slug}`;

      document.title = title;

      // Update OG / Twitter meta tags
      document.getElementById('og-title').setAttribute('content', title);
      document.getElementById('og-description').setAttribute('content', description);
      document.getElementById('og-image').setAttribute('content', image);
      document.getElementById('og-url').setAttribute('content', url);
      document.getElementById('tw-title').setAttribute('content', title);
      document.getElementById('tw-description').setAttribute('content', description);
      document.getElementById('tw-image').setAttribute('content', image);
      document.getElementById('meta-canonical').setAttribute('href', url);

      // Inject Product JSON-LD
      const availability = currentProduct.available === false
        ? 'https://schema.org/SoldOut'
        : 'https://schema.org/InStock';
      const ld = {
        '@context': 'https://schema.org',
        '@type': 'Product',
        name: currentProduct.name,
        description: currentProduct.description,
        image: (currentProduct.images || []).map(i => `https://robynandgold.com${i}`),
        brand: { '@type': 'Brand', name: 'Robyn & Gold' },
        offers: {
          '@type': 'Offer',
          url,
          price: currentProduct.price,
          priceCurrency: currentProduct.currency || 'EUR',
          availability,
          seller: { '@type': 'Organization', name: 'Robyn & Gold' }
        }
      };
      const existing = document.getElementById('product-ld');
      const script = existing || document.createElement('script');
      script.id = 'product-ld';
      script.type = 'application/ld+json';
      script.textContent = JSON.stringify(ld);
      if (!existing) document.head.appendChild(script);

      renderProduct();
    }

    function buildSlides() {
      const images = (currentProduct.images || []).map(src => ({ type: 'image', src }));
      const videos = (currentProduct.videos || []).map(src => ({ type: 'video', src }));
      return [...videos, ...images];
    }

    // Render product details
    function renderProduct() {
      const container = document.getElementById('product-detail');
      const isSold = currentProduct.available === false;
      const slides = buildSlides();

      const slidesHTML = slides.map((item, index) => {
        const activeClass = index === 0 ? ' active' : '';
        if (item.type === 'video') {
          return `
            <div class="carousel-slide${activeClass}" data-index="${index}">
              <video src="${item.src}" autoplay muted loop playsinline class="carousel-video"></video>
            </div>`;
        }
        return `
          <div class="carousel-slide${activeClass}" data-index="${index}">
            <img src="${item.src}" alt="${currentProduct.name} view ${index + 1}" onerror="this.style.display='none'" />
          </div>`;
      }).join('');

      container.innerHTML = `
        <div style="grid-column: 1 / -1; margin-bottom: 0.5rem;">
          <a href="shop.html" class="btn btn-ghost" style="padding: 0.5rem 1.1rem; font-size: 0.8rem;">← Back to shop</a>
        </div>
        <div class="product-detail-image" role="region" aria-label="Product media">
          <div class="carousel" id="image-carousel">
            ${slides.length > 1 ? `
            <button class="carousel-control prev" aria-label="Previous" id="carousel-prev"><svg width="10" height="18" viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,1 1,9 9,17"/></svg></button>
            <button class="carousel-control next" aria-label="Next" id="carousel-next"><svg width="10" height="18" viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,1 9,9 1,17"/></svg></button>` : ''}
            <div class="carousel-track" id="carousel-track">
              ${slidesHTML}
            </div>
            ${slides.length > 1 ? `
            <div class="carousel-dots" id="carousel-dots">
              ${slides.map((item, i) => `
                <button class="carousel-dot${i === 0 ? ' active' : ''}" data-index="${i}" aria-label="${item.type === 'video' ? 'Video' : 'Image ' + (i + 1)}">
                  ${item.type === 'video' ? '<svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><polygon points="1,0 7,4 1,8"/></svg>' : ''}
                </button>`).join('')}
            </div>` : ''}
          </div>
        </div>
        
        <div class="product-detail-info">
          <h1 class="product-detail-title">${currentProduct.name}</h1>
          <p class="product-detail-meta">Size ${currentProduct.size}</p>
          <p class="product-detail-price">${formatPrice(currentProduct.price, currentProduct.currency)}</p>
          ${isSold ? '' : `<p class="product-detail-oneoff">✦ One of a kind — only one available</p>`}

          ${isSold ? `
            <div style="background: var(--muted); color: white; padding: 1rem; border-radius: var(--radius-md); margin-top: 1.5rem; text-align: center;">
              <strong style="font-size: 1.1rem;">SOLD</strong>
              <p style="margin: 0.5rem 0 0 0; font-size: 0.9rem;">This piece has found its home</p>
            </div>
          ` : `
            <button id="add-to-cart-btn" class="btn btn-primary" style="margin-top: 1.5rem;">
              Add to cart
            </button>
            <p id="cart-message" style="margin-top: 0.8rem; font-size: 0.9rem; color: var(--muted); display: none;"></p>
          `}

          <div class="product-detail-copy" style="margin-top: 1.8rem;">${currentProduct.description}</div>

          ${isSold ? '' : `
          <ul class="product-trust">
            <li><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg> Free insured shipping from Ireland</li>
            <li><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg> Secure checkout via Stripe</li>
            <li><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 3 9l9 12 9-12z"/><path d="M3 9h18"/></svg> Personally sourced &amp; professionally prepared</li>
          </ul>`}
        </div>
      `;

      // Add event listeners
      setupCarousel();
      if (!isSold) {
        setupAddToCart();
      }
      setupStickyBar(isSold);
      renderRelated();
    }

    // "You might also like" — other available pieces
    function renderRelated() {
      const section = document.getElementById('related-section');
      const grid = document.getElementById('related-grid');
      if (!section || !grid) return;

      const others = allProducts
        .filter(p => p.slug !== currentProduct.slug && p.available !== false)
        .slice(0, 3);

      if (others.length === 0) { section.hidden = true; return; }

      grid.innerHTML = others.map(product => {
        const price = formatPrice(product.price, product.currency);
        const video = product.videos?.[0];
        const image = product.images?.[0];
        const media = video
          ? `<video src="${video}" class="product-card-image" autoplay muted loop playsinline></video>`
          : image
            ? `<img src="${image}" alt="${product.name}" class="product-card-image" width="600" height="600" loading="lazy" onerror="this.style.display='none'" />`
            : '';
        return `
          <article class="product-card">
            <a class="product-card-link-wrap" href="product-detail.html?slug=${product.slug}">
              ${media}
              <div class="product-card-body">
                <h3 class="product-card-title">${product.name}</h3>
                <p class="product-card-price">${price}</p>
                <span class="product-card-link">View details</span>
              </div>
            </a>
          </article>`;
      }).join('');

      section.hidden = false;
    }

    // Sticky mobile add-to-cart bar
    function setupStickyBar(isSold) {
      const bar = document.getElementById('product-sticky-bar');
      if (!bar) return;
      document.getElementById('psb-name').textContent = currentProduct.name;
      document.getElementById('psb-price').textContent = formatPrice(currentProduct.price, currentProduct.currency);

      const addBtn = document.getElementById('psb-add-btn');
      const soldTag = document.getElementById('psb-sold');

      if (isSold) {
        addBtn.hidden = true;
        soldTag.hidden = false;
      } else {
        addBtn.hidden = false;
        soldTag.hidden = true;
        addBtn.onclick = () => {
          const result = window.CartAPI.addToCart(currentProduct);
          if (result.success) {
            window.location.href = 'cart.html';
          } else {
            addBtn.textContent = 'In your bag — view';
            addBtn.onclick = () => window.location.href = 'cart.html';
          }
        };
      }
      bar.hidden = false;
    }
    
    // Setup carousel (images + videos)
    function setupCarousel() {
      const track = document.getElementById('carousel-track');
      if (!track) return;
      const slides = Array.from(track.querySelectorAll('.carousel-slide'));
      if (slides.length <= 1) return;

      const prevBtn = document.getElementById('carousel-prev');
      const nextBtn = document.getElementById('carousel-next');
      const dotBtns = Array.from(document.querySelectorAll('#carousel-dots .carousel-dot'));
      let isAnimating = false;
      const ANIM_MS = 280;

      function updateActive(nextIndex, direction) {
        const prevIndex = currentSlideIndex;
        currentSlideIndex = nextIndex;

        slides.forEach(s => s.classList.remove('active', 'enter-left', 'enter-right', 'exit-left', 'exit-right'));
        dotBtns.forEach((d, i) => d.classList.toggle('active', i === nextIndex));

        const prevSlide = slides[prevIndex];
        const nextSlide = slides[nextIndex];

        // Pause any playing video on the outgoing slide
        const outVideo = prevSlide && prevSlide.querySelector('video');
        if (outVideo) outVideo.pause();

        if (prevSlide && nextSlide) {
          prevSlide.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');
          nextSlide.classList.add(direction === 'next' ? 'enter-right' : 'enter-left');
        }
        if (nextSlide) {
          nextSlide.classList.add('active');
          // Play video when it becomes active
          const inVideo = nextSlide.querySelector('video');
          if (inVideo) inVideo.play();
        }
      }

      function goTo(index, directionHint) {
        if (isAnimating) return;
        isAnimating = true;
        if (prevBtn) prevBtn.disabled = true;
        if (nextBtn) nextBtn.disabled = true;

        let nextIndex = (index + slides.length) % slides.length;
        const direction = directionHint || (nextIndex > currentSlideIndex ? 'next' : 'prev');

        updateActive(nextIndex, direction);
        setTimeout(() => {
          isAnimating = false;
          if (prevBtn) prevBtn.disabled = false;
          if (nextBtn) nextBtn.disabled = false;
          slides.forEach(s => s.classList.remove('enter-left', 'enter-right', 'exit-left', 'exit-right'));
        }, ANIM_MS);
      }

      if (prevBtn) prevBtn.addEventListener('click', () => goTo(currentSlideIndex - 1, 'prev'));
      if (nextBtn) nextBtn.addEventListener('click', () => goTo(currentSlideIndex + 1, 'next'));
      dotBtns.forEach(d => d.addEventListener('click', () => goTo(parseInt(d.dataset.index))));

      // Touch/swipe
      let startX = 0;
      track.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
      track.addEventListener('touchend', (e) => {
        const delta = e.changedTouches[0].clientX - startX;
        if (Math.abs(delta) > 30) goTo(currentSlideIndex + (delta > 0 ? -1 : 1));
      });

      // Keyboard
      track.setAttribute('tabindex', '0');
      track.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(currentSlideIndex - 1, 'prev'); }
        if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentSlideIndex + 1, 'next'); }
      });
    }
    
    // Setup add to cart button
    function setupAddToCart() {
      const btn = document.getElementById('add-to-cart-btn');
      const message = document.getElementById('cart-message');
      
      btn.addEventListener('click', () => {
        const result = window.CartAPI.addToCart(currentProduct);
        
        message.textContent = result.message;
        message.style.display = 'block';
        message.style.color = result.success ? 'var(--accent)' : 'var(--muted)';
        
        if (result.success) {
          btn.textContent = 'Go to checkout';
          btn.onclick = () => window.location.href = 'cart.html';
        }
      });
    }
    
    // Load product on page load
    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>
</html>
