<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, follow" />
  <title>Redirecting… | Robyn &amp; Gold</title>
  <!--
    Product pages are now pre-rendered static files at /pages/product/<slug>.html
    (see scripts/build.js). This page only exists to forward old links of the
    form product-detail.html?slug=<slug> to their new home so shared/bookmarked
    URLs keep working.
  -->
  <script>
    (function () {
      var slug = new URLSearchParams(window.location.search).get('slug');
      var target = slug ? 'product/' + encodeURIComponent(slug) + '.html' : 'shop.html';
      window.location.replace(target);
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0; url=shop.html" /></noscript>
</head>
<body>
  <p>Redirecting to this piece… If nothing happens, <a href="shop.html">return to the shop</a>.</p>
</body>
</html>
