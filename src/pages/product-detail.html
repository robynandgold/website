<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Piece — Robyn &amp; Gold</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Discover one-of-a-kind antique rings and jewellery from Robyn &amp; Gold."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
  <link rel="manifest" href="/images/site.webmanifest" />
  </head>
  <body class="page">
    <header class="site-header">
      <div class="container header-inner">
        <nav class="nav nav-left" aria-label="Primary">
          <a href="shop.html" class="nav-link">Shop</a>
          <a href="../index.html#about" class="nav-link">Our story</a>
          <a href="../index.html#ethos" class="nav-link">Ethos</a>
        </nav>
        <div class="brand-banner">
          <div class="brand-center">
            <a href="../index.html">
              <img src="../images/logo.png" alt="Robyn & Gold" />
            </a>
            <a href="../index.html" class="brand-main">Robyn &amp; Gold</a>
            <span class="brand-tagline">Antique Jewellery</span>
          </div>
        </div>

        <nav class="nav nav-right" aria-label="Utilities">
          <a href="cart.html" class="nav-link nav-link--cart" aria-label="Cart">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="icon-cart"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
            <span id="cart-count" class="cart-count">0</span>
          </a>
        </nav>
      </div>
    </header>

  <main>
    <section class="section">
      <div class="container">
        <!-- JS populates this element -->
        <div id="product-detail" class="product-detail-layout">
          <!-- Example structure (for reference only; filled by JS):
          <div class="product-detail-image">
            <img src="../images/products/example.jpg" alt="..." />
          </div>
          <div class="product-detail-info">
            <p class="eyebrow">Art Deco · c.1930</p>
            <h1 class="product-detail-title">Art Deco Solitaire Diamond Ring</h1>
            <p class="product-detail-meta">Platinum · Old European-cut diamond · Size L</p>
            <p class="product-detail-price">£4,600</p>
            <button class="btn btn-primary">Add to cart</button>
            <div class="product-detail-copy">
              <p>Long-form description here...</p>
            </div>
          </div>
          -->
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand-main">Robyn &amp; Gold</span>
        <span class="brand-tagline">Antique Jewellery</span>
      </div>
      <div class="footer-links">
        <a href="/pages/shop.html" class="footer-link">Shop</a>
        <a href="/index.html#about" class="footer-link">About</a>
        <a href="/index.html#ethos" class="footer-link">Ethos</a>
        <a href="/pages/contact.html" class="footer-link">Contact</a>
      </div>
      <p class="footer-meta">© <span id="year"></span> Robyn &amp; Gold. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/products.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    let currentProduct = null;
    let currentSlideIndex = 0;

    function getSlugFromURL() {
      return new URLSearchParams(window.location.search).get('slug');
    }

    function formatPrice(price, currency = 'EUR') {
      const symbol = currency === 'EUR' ? '€' : currency === 'GBP' ? '£' : '$';
      return `${symbol}${price.toFixed(2)}`;
    }

    async function loadProduct() {
      const slug = getSlugFromURL();
      if (!slug) { window.location.href = 'shop.html'; return; }

      try {
        const response = await fetch('../data/products.json');
        if (response.ok) {
          const products = await response.json();
          currentProduct = products.find(p => p.slug === slug);
          if (currentProduct) { renderProductDetails(); return; }
        }
      } catch (e) {}

      // Fallback to ProductsAPI
      let attempts = 0;
      while (!window.ProductsAPI && attempts < 50) {
        await new Promise(resolve => setTimeout(resolve, 100));
        attempts++;
      }
      if (!window.ProductsAPI) return;

      currentProduct = await window.ProductsAPI.getProductBySlug(slug);

      if (!currentProduct) {
        document.getElementById('product-detail').innerHTML = `
          <div style="padding: 1.2rem; background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius-md); text-align: center;">
            <strong style="font-size: 1.05rem;">Product not found</strong>
            <p style="margin: 0.6rem 0 1rem; color: var(--muted);">The link may be outdated or the piece has been removed.</p>
            <a href="shop.html" class="btn btn-ghost">Back to collection</a>
          </div>`;
        return;
      }

      renderProductDetails();
    }

    function renderProductDetails() {
      if (!currentProduct) return;
      document.title = `${currentProduct.name} — Robyn & Gold`;
      renderProduct();
    }

    function buildSlides() {
      const images = (currentProduct.images || []).map(src => ({ type: 'image', src }));
      const videos = (currentProduct.videos || []).map(src => ({ type: 'video', src }));
      return [...images, ...videos];
    }

    // Render product details
    function renderProduct() {
      const container = document.getElementById('product-detail');
      const isSold = currentProduct.available === false;
      const slides = buildSlides();

      const slidesHTML = slides.map((item, index) => {
        const activeClass = index === 0 ? ' active' : '';
        if (item.type === 'video') {
          return `
            <div class="carousel-slide${activeClass}" data-index="${index}">
              <video src="${item.src}" autoplay muted loop playsinline class="carousel-video"></video>
            </div>`;
        }
        return `
          <div class="carousel-slide${activeClass}" data-index="${index}">
            <img src="${item.src}" alt="${currentProduct.name} view ${index + 1}" onerror="this.src='../images/homepage.png'" />
          </div>`;
      }).join('');

      container.innerHTML = `
        <div style="grid-column: 1 / -1; margin-bottom: 0.5rem;">
          <a href="shop.html" class="btn btn-ghost" style="padding: 0.5rem 1.1rem; font-size: 0.8rem;">← Back to shop</a>
        </div>
        <div class="product-detail-image" role="region" aria-label="Product media">
          <div class="carousel" id="image-carousel">
            ${slides.length > 1 ? `
            <button class="carousel-control prev" aria-label="Previous" id="carousel-prev">‹</button>
            <button class="carousel-control next" aria-label="Next" id="carousel-next">›</button>` : ''}
            <div class="carousel-track" id="carousel-track">
              ${slidesHTML}
            </div>
            ${slides.length > 1 ? `
            <div class="carousel-dots" id="carousel-dots">
              ${slides.map((item, i) => `
                <button class="carousel-dot${i === 0 ? ' active' : ''}" data-index="${i}" aria-label="${item.type === 'video' ? 'Video' : 'Image ' + (i + 1)}">
                  ${item.type === 'video' ? '<svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><polygon points="1,0 7,4 1,8"/></svg>' : ''}
                </button>`).join('')}
            </div>` : ''}
          </div>
        </div>
        
        <div class="product-detail-info">
          <p class="eyebrow">${currentProduct.period} · ${currentProduct.era}</p>
          <h1 class="product-detail-title">${currentProduct.name}</h1>
          <p class="product-detail-meta">${currentProduct.metal} · ${currentProduct.stones} · ${currentProduct.size}</p>
          <p class="product-detail-price">${formatPrice(currentProduct.price, currentProduct.currency)}</p>
          
          ${isSold ? `
            <div style="background: var(--muted); color: white; padding: 1rem; border-radius: var(--radius-md); margin-top: 1.5rem; text-align: center;">
              <strong style="font-size: 1.1rem;">SOLD</strong>
              <p style="margin: 0.5rem 0 0 0; font-size: 0.9rem;">This piece has found its home</p>
            </div>
          ` : `
            <button id="add-to-cart-btn" class="btn btn-primary" style="margin-top: 1.5rem;">
              Add to cart
            </button>
            <p id="cart-message" style="margin-top: 0.8rem; font-size: 0.9rem; color: var(--muted); display: none;"></p>
          `}
          
          <div class="product-detail-copy" style="margin-top: 1.8rem;">
            <p>${currentProduct.description}</p>
          </div>
          
          <dl style="margin-top: 1.5rem; display: grid; gap: 0.45rem; font-size: 0.88rem; border-top: 1px solid var(--border); padding-top: 1.2rem;">
            <div style="display: flex; gap: 0.8rem;">
              <dt style="color: var(--muted); min-width: 5rem;">Metal</dt>
              <dd style="margin: 0;">${currentProduct.metal}</dd>
            </div>
            <div style="display: flex; gap: 0.8rem;">
              <dt style="color: var(--muted); min-width: 5rem;">Stones</dt>
              <dd style="margin: 0;">${currentProduct.stones}</dd>
            </div>
            <div style="display: flex; gap: 0.8rem;">
              <dt style="color: var(--muted); min-width: 5rem;">Size</dt>
              <dd style="margin: 0;">${currentProduct.size}</dd>
            </div>
            <div style="display: flex; gap: 0.8rem;">
              <dt style="color: var(--muted); min-width: 5rem;">Period</dt>
              <dd style="margin: 0;">${currentProduct.period}</dd>
            </div>
            <div style="display: flex; gap: 0.8rem;">
              <dt style="color: var(--muted); min-width: 5rem;">Style</dt>
              <dd style="margin: 0;">${currentProduct.style}</dd>
            </div>
          </dl>
        </div>
      `;
      
      // Add event listeners
      setupCarousel();
      if (!isSold) {
        setupAddToCart();
      }
    }
    
    // Setup carousel (images + videos)
    function setupCarousel() {
      const track = document.getElementById('carousel-track');
      if (!track) return;
      const slides = Array.from(track.querySelectorAll('.carousel-slide'));
      if (slides.length <= 1) return;

      const prevBtn = document.getElementById('carousel-prev');
      const nextBtn = document.getElementById('carousel-next');
      const dotBtns = Array.from(document.querySelectorAll('#carousel-dots .carousel-dot'));
      let isAnimating = false;
      const ANIM_MS = 280;

      function updateActive(nextIndex, direction) {
        const prevIndex = currentSlideIndex;
        currentSlideIndex = nextIndex;

        slides.forEach(s => s.classList.remove('active', 'enter-left', 'enter-right', 'exit-left', 'exit-right'));
        dotBtns.forEach((d, i) => d.classList.toggle('active', i === nextIndex));

        const prevSlide = slides[prevIndex];
        const nextSlide = slides[nextIndex];

        // Pause any playing video on the outgoing slide
        const outVideo = prevSlide && prevSlide.querySelector('video');
        if (outVideo) outVideo.pause();

        if (prevSlide && nextSlide) {
          prevSlide.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');
          nextSlide.classList.add(direction === 'next' ? 'enter-right' : 'enter-left');
        }
        if (nextSlide) {
          nextSlide.classList.add('active');
          // Play video when it becomes active
          const inVideo = nextSlide.querySelector('video');
          if (inVideo) inVideo.play();
        }
      }

      function goTo(index, directionHint) {
        if (isAnimating) return;
        isAnimating = true;
        if (prevBtn) prevBtn.disabled = true;
        if (nextBtn) nextBtn.disabled = true;

        let nextIndex = (index + slides.length) % slides.length;
        const direction = directionHint || (nextIndex > currentSlideIndex ? 'next' : 'prev');

        updateActive(nextIndex, direction);
        setTimeout(() => {
          isAnimating = false;
          if (prevBtn) prevBtn.disabled = false;
          if (nextBtn) nextBtn.disabled = false;
        }, ANIM_MS);
      }

      if (prevBtn) prevBtn.addEventListener('click', () => goTo(currentSlideIndex - 1, 'prev'));
      if (nextBtn) nextBtn.addEventListener('click', () => goTo(currentSlideIndex + 1, 'next'));
      dotBtns.forEach(d => d.addEventListener('click', () => goTo(parseInt(d.dataset.index))));

      // Touch/swipe
      let startX = 0;
      track.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
      track.addEventListener('touchend', (e) => {
        const delta = e.changedTouches[0].clientX - startX;
        if (Math.abs(delta) > 30) goTo(currentSlideIndex + (delta > 0 ? -1 : 1));
      });

      // Keyboard
      track.setAttribute('tabindex', '0');
      track.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(currentSlideIndex - 1, 'prev'); }
        if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentSlideIndex + 1, 'next'); }
      });
    }
    
    // Setup add to cart button
    function setupAddToCart() {
      const btn = document.getElementById('add-to-cart-btn');
      const message = document.getElementById('cart-message');
      
      btn.addEventListener('click', () => {
        const result = window.CartAPI.addToCart(currentProduct);
        
        message.textContent = result.message;
        message.style.display = 'block';
        message.style.color = result.success ? 'var(--accent)' : 'var(--muted)';
        
        if (result.success) {
          btn.textContent = 'Added to cart';
          setTimeout(() => {
            btn.textContent = 'Add to cart';
          }, 2000);
        }
      });
    }
    
    // Load product on page load
    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>
</html>
