  <main>
    <!-- Filters + product grid -->
    <section class="section section--compact">
      <div class="container shop-layout">
        <aside class="shop-filters" aria-label="Filters">
          <h2 class="filters-title">Refine</h2>

          <label class="filter-group">
            <span class="filter-label">Category</span>
            <select id="filter-category" class="filter-select">
              <option value="">All categories</option>
              <!-- Category options are populated from the live catalogue in JS -->
            </select>
          </label>

          <label class="filter-group">
            <span class="filter-label">Sort</span>
            <select id="filter-sort" class="filter-select">
              <option value="newest">Newest first</option>
              <option value="price-asc">Price · Low to high</option>
              <option value="price-desc">Price · High to low</option>
            </select>
          </label>

          <button id="clear-filters" class="btn btn-ghost btn-full">
            Clear filters
          </button>
        </aside>

        <div class="shop-results">
          <div class="shop-results-header">
            <p class="shop-count" id="product-count">Showing all pieces</p>
          </div>

          <!-- JS will render products here -->
          <div id="product-list" class="product-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/products.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    let allProducts = [];

    // A piece is shown when it isn't sold and any scheduled GMT drop has passed.
    function isLive(product) {
      if (window.ProductsAPI && window.ProductsAPI.isPubliclyLive) return window.ProductsAPI.isPubliclyLive(product);
      if (product.available === false) return false;
      if (product.dropAt) {
        const t = Date.parse(product.dropAt);
        if (!isNaN(t) && t > Date.now()) return false;
      }
      return true;
    }

    // Load and render products
    async function loadShopProducts() {
      console.log('=== SHOP PAGE: Starting to load products ===');
      
      // First try to load products directly without waiting for ProductsAPI
      try {
        console.log('Trying direct fetch of products...');
        const response = await fetch('../data/products.json', { cache: 'no-store' });
        console.log('Direct fetch response:', response.status, response.ok);
        
        if (response.ok) {
          const products = await response.json();
          console.log('Direct fetch successful, got', products.length, 'products');
          // Filter for available products (and hide any piece whose GMT drop hasn't happened yet)
          allProducts = products.filter(isLive);
          console.log('Available products:', allProducts.length);
          populateCategories();
          filterProducts(); // applies the default "newest first" sort
          return; // Success, exit here
        }
      } catch (error) {
        console.log('Direct fetch failed:', error);
      }
      
      // Fallback to ProductsAPI method
      console.log('Falling back to ProductsAPI method...');
      
      // Wait for ProductsAPI to be available
      let attempts = 0;
      while (!window.ProductsAPI && attempts < 50) {
        console.log('Waiting for ProductsAPI, attempt:', attempts + 1);
        await new Promise(resolve => setTimeout(resolve, 100));
        attempts++;
      }
      
      if (!window.ProductsAPI) {
        console.error('ProductsAPI not available after waiting');
        const grid = document.getElementById('product-list');
        grid.innerHTML = '<p class="cart-empty-message">Failed to load ProductsAPI. Please refresh the page.</p>';
        return;
      }
      
      console.log('ProductsAPI is available, calling getAllProducts()');
      
      try {
        allProducts = await window.ProductsAPI.getAllProducts();
        console.log('Products loaded successfully:', allProducts.length, allProducts);
        
        if (!allProducts || allProducts.length === 0) {
          console.log('No products returned from getAllProducts()');
          const grid = document.getElementById('product-list');
          grid.innerHTML = '<p class="cart-empty-message">No products available.</p>';
          return;
        }

        populateCategories();
        filterProducts(); // applies the default "newest first" sort
      } catch (error) {
        console.error('Error calling getAllProducts():', error);
        const grid = document.getElementById('product-list');
        grid.innerHTML = '<p class="cart-empty-message">Failed to load products. Error: ' + error.message + '</p>';
      }
    }
    
    // Render products to grid
    function renderProducts(products) {
      const grid = document.getElementById('product-list');
      const countEl = document.getElementById('product-count');
      
      if (!products || products.length === 0) {
        grid.innerHTML = '<p class="cart-empty-message">No products found matching your filters.</p>';
        countEl.textContent = 'No pieces found';
        return;
      }
      
      countEl.textContent = `Showing ${products.length} ${products.length === 1 ? 'piece' : 'pieces'}`;
      
      grid.innerHTML = products.map(product => {
        const price = window.ProductsAPI?.formatPrice
          ? window.ProductsAPI.formatPrice(product.price, product.currency)
          : `€${product.price}`;

        const productLink = `product/${product.slug}.html`;
        const video = product.videos?.[0];
        const image = product.images?.[0];
        const media = video
          ? `<div class="product-media"><video src="${video}" class="product-card-image" muted loop playsinline preload="none"${image ? ` poster="${image}"` : ''}></video>${image ? `<img src="${image}" alt="" aria-hidden="true" class="media-poster" loading="lazy" />` : ''}</div>`
          : image
            ? `<img src="${image}" alt="${product.name}" class="product-card-image" width="600" height="600" loading="lazy" onerror="this.style.display='none'" />`
            : '';

        return `
        <article class="product-card">
          <a class="product-card-link-wrap" href="${productLink}">
            ${media}
            <div class="product-card-body">
              <h3 class="product-card-title">${product.name}</h3>
              <p class="product-card-price">${price}</p>
              <span class="product-card-link">View details</span>
            </div>
          </a>
        </article>
      `;}).join('');

      // Play videos only while they're in view
      if (window.lazyPlayVideos) window.lazyPlayVideos(grid);
    }

    // Build the category dropdown from the categories actually in stock, so a
    // category only appears once there's a piece to show (and never goes stale).
    const CATEGORY_LABELS = {
      rings: 'Rings',
      necklaces: 'Necklaces',
      bracelets: 'Bracelets',
      earrings: 'Earrings',
      brooches: 'Brooches'
    };
    function populateCategories() {
      const select = document.getElementById('filter-category');
      if (!select) return;
      const current = select.value;
      const present = [...new Set(allProducts.map(p => (p.category || '').toLowerCase()).filter(Boolean))];
      // Show known categories in a stable order, then any others alphabetically.
      const order = Object.keys(CATEGORY_LABELS);
      present.sort((a, b) => {
        const ia = order.indexOf(a), ib = order.indexOf(b);
        if (ia !== -1 && ib !== -1) return ia - ib;
        if (ia !== -1) return -1;
        if (ib !== -1) return 1;
        return a.localeCompare(b);
      });
      const label = c => CATEGORY_LABELS[c] || (c.charAt(0).toUpperCase() + c.slice(1));
      select.innerHTML = '<option value="">All categories</option>' +
        present.map(c => `<option value="${c}">${label(c)}</option>`).join('');
      // Preserve the shopper's selection if it's still available.
      select.value = present.includes(current) ? current : '';
    }

    // Filter and sort products
    function filterProducts() {
      const category = document.getElementById('filter-category').value;
      const sort = document.getElementById('filter-sort').value;

      let filtered = [...allProducts];

      // Filter by category
      if (category) {
        filtered = filtered.filter(p => (p.category || '').toLowerCase() === category.toLowerCase());
      }
      
      // Sort
      if (sort === 'price-asc') {
        filtered.sort((a, b) => a.price - b.price);
      } else if (sort === 'price-desc') {
        filtered.sort((a, b) => b.price - a.price);
      } else if (sort === 'newest') {
        // Newest first by date added. Items without a date sort last;
        // ties (e.g. the original bulk import) keep their array order.
        filtered.sort((a, b) => {
          const da = a.createdAt ? Date.parse(a.createdAt) : -Infinity;
          const db = b.createdAt ? Date.parse(b.createdAt) : -Infinity;
          return db - da;
        });
      }

      renderProducts(filtered);
    }
    
    // Clear filters
    function clearFilters() {
      document.getElementById('filter-category').value = '';
      document.getElementById('filter-sort').value = 'newest';
      filterProducts();
    }

    // Event listeners
    document.getElementById('filter-category').addEventListener('change', filterProducts);
    document.getElementById('filter-sort').addEventListener('change', filterProducts);
    document.getElementById('clear-filters').addEventListener('click', clearFilters);
    
    // Load products on page load
    document.addEventListener('DOMContentLoaded', loadShopProducts);
  </script>
