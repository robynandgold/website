# Cloudflare Worker configuration.
#
# This is a Worker with Static Assets: it serves the static site from src/
# (via the ASSETS binding) and runs worker/index.js for the /api/* routes.
#
# - nodejs_compat: lets the Stripe SDK and node:crypto / node:buffer run on
#   the Workers runtime.
# - The default build deploy command (npx wrangler deploy) reads this file.
name = "website"
main = "worker/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./src"
binding = "ASSETS"
